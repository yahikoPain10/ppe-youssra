<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ÉPI</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .epi-loader{position:fixed;inset:0;z-index:99999;display:grid;place-items:center;background:linear-gradient(135deg,#f8fafc,#f3e8ff);transition:opacity .28s ease,visibility .28s ease}.epi-loader.hide{opacity:0;visibility:hidden}.epi-loader-card{width:min(360px,calc(100vw - 42px));border:1px solid rgba(109,40,217,.18);border-radius:18px;background:rgba(255,255,255,.96);box-shadow:0 18px 40px rgba(76,29,149,.12);padding:18px;text-align:center;font-family:system-ui,-apple-system,Segoe UI,sans-serif;color:#32106b}.epi-loader-card strong{display:block;font-size:1.05rem;margin-bottom:7px}.epi-loader-bar{height:8px;background:#ede9fe;border-radius:999px;overflow:hidden;margin-top:14px}.epi-loader-bar span{display:block;height:100%;width:45%;border-radius:999px;background:linear-gradient(90deg,#6d28d9,#8b5cf6);animation:epiLoad 1.1s ease-in-out infinite}@keyframes epiLoad{0%{transform:translateX(-110%)}100%{transform:translateX(240%)}}.epi-booting #app{opacity:0}.epi-ready #app{opacity:1;transition:opacity .22s ease}
  </style>
</head>
<body>
  <noscript>Cette application nécessite JavaScript.</noscript>
  <div id="epiLoadingScreen" class="epi-loader" aria-live="polite">
    <div class="epi-loader-card">
      <strong>Chargement de l'application</strong>
      <span>Préparation des espaces élève et professeur...</span>
      <div class="epi-loader-bar"><span></span></div>
    </div>
  </div>
  <div id="app"></div>

  <!-- performance-boost and server-storage load immediately (no app code yet) -->
  <script src="performance-boost.js"></script>
  <script src="server-storage.js"></script>

  <!-- All other scripts are injected AFTER the storage preload resolves,
       so every localStorage.getItem() call hits a warm cache, never the network. -->
  <script>
    (function(){
      var APP_SCRIPTS = [
        'app.js',
        'content-data.js',
        'dynamic-app.js',
        'teacher-content-manager.js',
        'media-import-fix.js',
        'media-preview-upload-fix.js',
        'interface-stability-fix.js',
        'content-storage-fix.js',
        'visual-content-fix.js',
        'student-interface-fix.js',
        'exam-remediation-fix.js',
        'auth-buttons-fix.js',
        'auth-student-access.js',
        'clean-components-interface.js',
        'student-dropdown-about-menu.js',
        'back-button-about-layout.js',
        'pages-styles-back-navigation.js',
        'styles-menu-back-fixes.js',
        'shortcut-true-false-game.js',
        'shortcut-admin-editor.js',
        'professional-interface-buttons-check.js',
        'corrections-finales.js',
        'integration-file-submissions.js'
      ];

      function loadScriptsSequentially(scripts, done){
        if(!scripts.length) return done();
        var s = document.createElement('script');
        s.src = scripts[0];
        s.onload = function(){ loadScriptsSequentially(scripts.slice(1), done); };
        s.onerror = function(){ loadScriptsSequentially(scripts.slice(1), done); };
        document.body.appendChild(s);
      }

      // Wait for the storage preload then boot the app
      var preloadReady = (window.EPI_SERVER_STORAGE && window.EPI_SERVER_STORAGE.preload)
        ? window.EPI_SERVER_STORAGE.preload()
        : Promise.resolve();

      preloadReady.then(function(){
        loadScriptsSequentially(APP_SCRIPTS, function(){ /* all scripts loaded */ });
      });
    })();
  </script>
</body>
</html>
